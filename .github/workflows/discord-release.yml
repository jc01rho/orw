# Manual Discord re-announce workflow.
#
# The primary path is release.yml's discord-announce job. This workflow is a
# manual override for webhook outages, external/manual releases, or formatting
# tests without cutting a new release.

name: Discord Release Announcement (manual)

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: Release title (e.g. v0.1.0)
        required: true
      release_body:
        description: Release body markdown
        required: true
      release_html_url:
        description: Release URL
        required: false

permissions:
  contents: read

jobs:
  announce:
    name: Post to Discord
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: GitHub Releases to Discord
        uses: SethCohen/github-releases-to-discord@v1
        with:
          webhook_url: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          color: "2902140"
          username: "ORW Releases"
          reduce_headings: true
          remove_github_reference_links: false
          footer_title: "Changelog"
          footer_timestamp: true
          release_name: ${{ inputs.release_name }}
          release_body: ${{ inputs.release_body }}
          release_html_url: ${{ inputs.release_html_url }}
